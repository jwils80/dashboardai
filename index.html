<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+Pro:wght@400;600&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="header-content">
            <h1 class="clock" id="clock">00:00</h1>
            <p class="date" id="date">January 1, 2026</p>
        </div>
        <div class="header-actions" style="display: flex; gap: 15px; align-items: center;">
            <button id="lockToggleBtn" class="primary-btn"
                style="background: var(--purple); color: #fff; border-color: var(--black);">🔒 LOCK</button>
            <button id="addCategoryBtn" class="primary-btn">+ NEW CATEGORY</button>
        </div>
    </header>

    <div class="marquee-container">
        <div class="marquee-content">The greatest think you'll ever learn is just to love, and be loved in return.</div>
    </div>

    <!-- Tabs Container -->
    <div id="tabsContainer" class="tabs-container"></div>

    <main id="dashboard" class="dashboard-grid">
        <!-- Categories will be injected here -->
    </main>

    <div class="under-construction"></div>

    <!-- Modal for Adding/Editing -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modalTitle">Add Item</h2>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>
            <form id="itemForm">
                <input type="hidden" id="formMode"> <!-- "addCat", "addLink", "editLink" -->
                <input type="hidden" id="formCatId">
                <input type="hidden" id="formLinkId">

                <div class="form-group" id="nameGroup">
                    <label for="itemName">Name</label>
                    <input type="text" id="itemName" placeholder="E.g., Design Inspiration" required autocomplete="off">
                </div>

                <div class="form-group" id="urlGroup">
                    <label for="itemUrl">URL</label>
                    <input type="url" id="itemUrl" placeholder="https://..." autocomplete="off">
                </div>

                <div class="form-group" id="descGroup" style="display: none;">
                    <label for="itemDesc">DESCRIPTION (OPTIONAL)</label>
                    <input type="text" id="itemDesc" placeholder="Brief note about this link..." autocomplete="off">
                </div>

                <div class="modal-actions">
                    <button type="button" id="cancelBtn" class="secondary-btn">Cancel</button>
                    <button type="submit" class="primary-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div id="confirmOverlay" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="confirmTitle">Delete Item</h2>
            </div>
            <p style="margin-bottom: 2rem; color: var(--text-muted); font-size: 0.9375rem;">Are you sure you want to
                delete this? This action cannot be undone.</p>
            <div class="modal-actions" style="margin-top: 0;">
                <button type="button" id="cancelConfirmBtn" class="secondary-btn">Cancel</button>
                <button type="button" id="confirmDeleteBtn" class="danger-btn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div id="passwordOverlay" class="modal-overlay hidden">
        <div class="modal-card" style="max-width: 400px;">
            <div class="modal-header">
                <h2>ENTER PASSWORD</h2>
                <button id="closePasswordBtn" class="close-btn">&times;</button>
            </div>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="passwordInput">PASSWORD</label>
                    <input type="password" id="passwordInput" placeholder="••••••••" required autocomplete="off">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="primary-btn">UNLOCK 🔓</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
